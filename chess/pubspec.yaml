name: chessp
description: A complete chess game application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image: ^4.1.0
  flutter_animate: ^4.5.0
  audioplayers: ^6.0.0
  provider: ^6.1.1
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  supabase_flutter: ^2.5.6
  image_picker: ^1.0.7
  intl: ^0.19.0
  chess: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/d.png
    - assets/h.png
    - assets/i.jpg

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/d.png"

  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/d.png"

  min_sdk_android: 21